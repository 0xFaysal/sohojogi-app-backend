services:
  - type: web
    name: sohojogi-backend
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_NAME
        value: Sohojogi
      - key: API_VERSION
        value: v1
      - key: MONGO_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRY
        value: 1h
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: BCRYPT_SALT_ROUNDS
        value: "12"
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: LOG_FILE_PATH
        value: ./logs
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_SECURE
        value: "false"
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: OTP_MAX_ATTEMPTS
        value: "5"
      - key: OTP_EXPIRY_MINUTES
        value: "10"
      - key: STRICT_MAX_ATTEMPTS
        value: "10"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
